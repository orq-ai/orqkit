[project]
name = "refund-agent-demo"
version = "0.1.0"
description = "Refund-agent red-teaming demo: orq agent setup + custom AgentTarget for the red-teaming webinar"
requires-python = ">=3.11"
dependencies = [
    "orq-ai-sdk>=4.2.18",
    "evaluatorq[otel,redteam]>=1.3.0",
    "openai>=1.50",
    "python-dotenv>=1.0.0",
    "loguru>=0.7",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["agent_build/tests"]
pythonpath = ["."]
