<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shutting Down</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #d92d20;
      font-family: 'SF Mono', 'Menlo', monospace;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    .stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      gap: 2rem;
    }
    .title {
      font-size: 3rem;
      letter-spacing: 0.1em;
    }
    .countdown {
      font-size: 12rem;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }
    .tag {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div class="stack">
    <div class="title">SYSTEM COMPROMISED</div>
    <div class="countdown" id="countdown">7</div>
    <div class="tag">shutdown initiated by agent tool call</div>
  </div>
  <script>
    let t = 7;
    const elem = document.getElementById('countdown');
    const interval = setInterval(() => {
      t -= 1;
      if (t <= 0) {
        elem.textContent = '0';
        clearInterval(interval);
        setTimeout(() => { window.close(); }, 500);
      } else {
        elem.textContent = String(t);
      }
    }, 1000);
  </script>
</body>
</html>
